<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美团商品 ↔ DrugID 对码工作台</title>
  <script>
    window.APP_ASSET_VERSION = '10.0.1';
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    :root {
      --bg: #d8e6ee;
      --panel: #f8fbfd;
      --border: rgba(203, 213, 225, 0.72);
      --text: #182230;
      --muted: #7a8797;
      --meituan: #ffc300;
      --drug: #11a69a;
      --drug-soft: #d8fbf5;
      --accent: #0088FF;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --shadow: 0 26px 80px rgba(32, 52, 68, 0.16);
      --radius: 28px;
      --bookmark-w: 168px;
      --tab-out: 10px;
      --font: 'Noto Sans SC', 'DM Sans', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.9) 0, rgba(255, 255, 255, 0) 26%),
        radial-gradient(circle at 84% 8%, rgba(0, 136, 255, 0.22) 0, rgba(0, 136, 255, 0) 20%),
        linear-gradient(135deg, #a9bfcb 0%, #d8e6ee 46%, #eef5f8 100%);
      color: var(--text);
    }

    .layout {
      display: flex;
      min-height: 100vh;
      width: 100%;
      gap: 18px;
      padding: 18px;
    }

    .system-sidebar {
      flex: 0 0 220px;
      background: rgba(248, 251, 253, 0.86);
      color: #334155;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 30px;
      box-shadow: 0 24px 70px rgba(32, 52, 68, 0.16);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 80;
    }

    .system-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 6px 14px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.08);
    }

    .system-logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0088FF, #33A0FF);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: 0 12px 26px rgba(0, 136, 255, 0.24);
    }

    .system-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }

    .system-logo-text strong {
      color: #182230;
      font-size: 0.96rem;
    }

    .system-logo-text span {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .side-section-title {
      margin: 0 8px 8px;
      color: #64748b;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .side-nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .side-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      color: #334155;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .side-link:hover {
      background: rgba(255, 255, 255, 0.78);
      border-color: rgba(255, 255, 255, 0.82);
      color: #182230;
    }

    .side-link.is-active {
      background: linear-gradient(135deg, #0088FF, #006FD6);
      color: #fff;
      box-shadow: 0 14px 30px rgba(0, 136, 255, 0.24);
    }

    .side-footer {
      margin-top: auto;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.72);
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .app {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      max-width: none;
      margin: 0 auto;
      padding: 18px;
      gap: 12px;
      border-radius: 34px;
      background: rgba(248, 251, 253, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topbar h1 {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: 0.02em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .link-history {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--drug);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--drug-soft);
      background: var(--drug-soft);
    }

    .link-history:hover {
      background: #99f6e4;
    }

    .progress-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .progress-main {
      flex: 1;
      min-width: 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .progress-meta strong {
      color: var(--text);
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--drug), #2dd4bf);
      transition: width 0.35s ease;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .btn-lg {
      font-size: 0.82rem;
      padding: 9px 16px;
      border-radius: 10px;
    }

    .btn-warn {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #c2410c;
    }

    .btn-warn:hover:not(:disabled) {
      background: #ffedd5;
    }

    .main {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
      border-radius: var(--radius);
      overflow: visible;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      background: var(--panel);
      position: relative;
      z-index: 0;
      isolation: isolate;
    }

    .col-meituan {
      flex: 0 0 38%;
      min-width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #fffdf5 0%, #fff 40%);
      position: relative;
      z-index: 1;
      border-radius: var(--radius) 0 0 var(--radius);
      overflow: hidden;
    }

    .col-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill-meituan {
      background: var(--meituan);
      color: #1a1a1a;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 8px;
    }

    .col-body {
      padding: 16px 18px;
      overflow: auto;
      flex: 1;
    }

    .product-title {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.35;
      margin: 0 0 12px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-card {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .meta-card.full { grid-column: 1 / -1; }

    .meta-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 0.9rem;
      font-weight: 600;
      word-break: break-all;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #f1f5f9;
    }

    .col-drugs {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #fafbfc;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .drug-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .drug-head-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .pill-drug {
      background: var(--drug-soft);
      color: #0f766e;
      font-weight: 700;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 8px;
    }

    .drug-grid {
      flex: 1;
      min-height: 360px;
      min-width: 0;
      padding: 12px;
      gap: 10px;
      overflow: auto;
    }

    .drug-grid[data-slots='1'],
    .drug-grid[data-slots='2'],
    .drug-grid[data-slots='3'] {
      display: flex;
      flex-direction: row;
    }

    .drug-grid[data-slots='4'] {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      align-content: stretch;
    }

    .drug-grid[data-slots='4'] .drug-slot {
      flex: none;
      min-height: 0;
    }

    .drug-slot {
      flex: 1;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }

    .drug-slot.is-picked {
      border-color: var(--drug);
      box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.25);
    }

    .drug-slot-inner {
      padding: 12px;
      overflow: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pick-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #f0fdfa;
      border: 1px solid #99f6e4;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #0f766e;
      cursor: pointer;
      user-select: none;
    }

    .pick-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--drug);
      cursor: pointer;
    }

    .drug-grid[data-slots='1'] .gallery-drug { grid-template-columns: repeat(3, 1fr); }
    .drug-grid[data-slots='1'] .gallery-drug img {
      max-height: clamp(140px, 28vh, 260px);
    }
    .drug-grid[data-slots='2'] .gallery-drug { grid-template-columns: repeat(3, 1fr); }
    .drug-grid[data-slots='2'] .gallery-drug img {
      max-height: clamp(100px, 18vh, 180px);
    }
    .drug-grid[data-slots='3'] .gallery-drug,
    .drug-grid[data-slots='4'] .gallery-drug { grid-template-columns: repeat(3, 1fr); }
    .drug-grid[data-slots='3'] .gallery-drug img {
      max-height: clamp(72px, 12vh, 120px);
    }
    .drug-grid[data-slots='4'] .gallery-drug img {
      max-height: clamp(56px, 10vh, 96px);
    }

    .gallery-drug {
      display: grid;
      gap: 6px;
    }

    .gallery-drug img {
      width: 100%;
      height: auto;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .drug-title {
      font-size: clamp(0.78rem, 1.1vw, 0.95rem);
      font-weight: 700;
      line-height: 1.3;
      margin: 0;
    }

    .drug-identity {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .drug-name-inline {
      font-size: clamp(0.8rem, 1.1vw, 0.98rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
    }

    .drug-name-inline .drug-code {
      color: #0f172a;
      font-weight: 800;
      margin-right: 4px;
    }

    .confidence-tag {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .confidence-high {
      color: #0088FF;
      background: #dff1ff;
      border-color: rgba(0, 136, 255, 0.18);
    }

    .confidence-mid {
      color: #059669;
      background: #dcfce7;
      border-color: rgba(5, 150, 105, 0.2);
    }

    .confidence-low {
      color: #64748b;
      background: #eef2f7;
      border-color: rgba(100, 116, 139, 0.18);
    }

    .meta-grid-drug {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .drug-grid[data-slots='1'] .meta-grid-drug {
      grid-template-columns: repeat(2, 1fr);
    }

    .meta-tiny {
      font-size: clamp(0.65rem, 0.9vw, 0.78rem);
      padding: 6px 8px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid var(--border);
    }

    .meta-tiny .l {
      color: var(--muted);
      font-size: 0.65em;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .col-bookmarks {
      flex: 0 0 var(--bookmark-w);
      border-left: 1px solid var(--border);
      background: #f1f5f9;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      z-index: 40;
      box-shadow: -6px 0 24px rgba(15, 23, 42, 0.06);
      border-radius: 0 var(--radius) var(--radius) 0;
      overflow: visible;
    }

    .bm-head {
      padding: 10px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #e2e8f0;
    }

    .bm-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: visible;
      padding: 10px 8px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 41;
    }

    .bm-card {
      position: relative;
      z-index: 1;
      margin-left: 4px;
      padding: 10px 10px 10px 12px;
      border-radius: 0 10px 10px 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: none;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
      transition: margin-left 0.2s ease, box-shadow 0.2s ease, border-color 0.2s, z-index 0.2s;
    }

    .bm-card.is-visible {
      z-index: 50;
      margin-left: calc(-1 * var(--tab-out));
      border-color: var(--drug);
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.18);
    }

    .bm-id {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--drug);
      margin-bottom: 4px;
    }

    .bm-name {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bm-identity {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 8px;
    }

    .bm-title {
      min-width: 0;
      font-size: 0.74rem;
      font-weight: 800;
      line-height: 1.35;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bm-title .drug-code {
      color: #0f766e;
      font-weight: 800;
      margin-right: 2px;
    }

    .bm-identity .confidence-tag {
      min-width: 44px;
      height: 20px;
      padding: 0 7px;
      font-size: 0.62rem;
    }

    .bm-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn {
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 7px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--drug);
      color: #fff;
    }

    .btn-primary:hover { background: #0f766e; }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #fff;
      border-color: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover { background: #f8fafc; }

    .btn-danger {
      background: #fef2f2;
      border-color: #fecaca;
      color: var(--danger);
    }

    .btn-danger:hover { background: #fee2e2; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: #1e293b;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      z-index: 200;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .done-screen {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 48px 24px;
      text-align: center;
      background: linear-gradient(180deg, #f0fdfa 0%, var(--panel) 50%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .done-screen.show { display: flex; }

    .done-screen h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      color: var(--drug);
    }

    .done-screen p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .workbench.hide { display: none; }

    @media (max-width: 1024px) {
      .layout {
        flex-direction: column;
      }
      .system-sidebar {
        flex: none;
        padding: 10px 12px;
      }
      .system-logo {
        padding-bottom: 8px;
      }
      .side-nav {
        flex-direction: row;
        overflow-x: auto;
      }
      .side-link {
        white-space: nowrap;
      }
      .side-footer {
        display: none;
      }
      .main { flex-direction: column; }
      .col-meituan {
        flex: none;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 45vh;
      }
      .col-bookmarks {
        flex: none;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 220px;
      }
      .bm-list {
        flex-direction: row;
        overflow-x: auto;
        padding: 10px 12px;
      }
      .bm-card {
        min-width: 148px;
        margin-left: 0;
        border-left: 1px solid var(--border);
        border-radius: 10px;
      }
      .bm-card.is-visible {
        margin-left: 0;
        margin-top: -6px;
      }
    }
    /* High fidelity UI skin: inspired by soft bento SaaS landing pages */
    body {
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.75) 0, transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(124, 92, 255, 0.18) 0, transparent 24%),
        linear-gradient(135deg, #a9bfca 0%, #dbe7ed 46%, #f4f7f8 100%);
    }

    .layout {
      gap: 18px;
      padding: 18px;
    }

    .system-sidebar {
      flex-basis: 232px;
      border-radius: 30px;
      background: rgba(247, 250, 252, 0.78);
      color: #334155;
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 24px 70px rgba(29, 47, 64, 0.16);
      backdrop-filter: blur(18px);
    }

    .system-logo {
      border-bottom-color: rgba(51, 65, 85, 0.08);
    }

    .system-logo-mark {
      background: linear-gradient(135deg, #0088FF, #33A0FF);
      box-shadow: 0 12px 26px rgba(0, 136, 255, 0.24);
    }

    .system-logo-text strong {
      color: #182230;
    }

    .system-logo-text span,
    .side-section-title,
    .side-footer {
      color: #7a8797;
    }

    .side-link {
      color: #334155;
      border: 1px solid transparent;

        try {
          localStorage.removeItem(LEGACY_KEY);
        } catch (e2) {}
        return null;
      }

      function saveState(s) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
        } catch (e) {}
      }

        return {
          version: 2,
          tasks: buildDefaultTasks(),
          currentTaskIndex: 0,
          visibleDrugIds: null,
          selectedDrugId: null
        };

      function candidateIdsForTask(task) {
        return (task.candidates || []).map(function (c) { return c.id; });

      function normalizeState(s) {
        var d = defaultState();
        if (!s || s.version !== 2 || !Array.isArray(s.tasks) || s.tasks.length === 0) return d;
        var tasks = s.tasks;
        var idx = Math.max(0, Math.min(Number(s.currentTaskIndex) || 0, tasks.length));
        if (idx < tasks.length && tasks[idx].status !== 'pending') {
          while (idx < tasks.length && tasks[idx].status !== 'pending') idx++;
        }
        if (idx >= tasks.length) idx = tasks.length;
        var vis = Array.isArray(s.visibleDrugIds) ? s.visibleDrugIds.slice() : null;
        var cand = idx < tasks.length ? candidateIdsForTask(tasks[idx]) : [];
        if (!vis || vis.length === 0) {
          vis = cand.length ? [cand[0]] : [];
        }
        vis = vis.filter(function (id) { return cand.indexOf(id) !== -1; });
        if (vis.length === 0 && cand.length) vis = [cand[0]];
        if (vis.length > MAX_SLOTS) vis = vis.slice(0, MAX_SLOTS);
        var sel = s.selectedDrugId;
        if (sel && cand.indexOf(sel) === -1) sel = null;
        return {
          version: 2,
          tasks: tasks,
          currentTaskIndex: idx,
          visibleDrugIds: vis,
          selectedDrugId: sel || null
        };
      }

      function persist() {
        saveState(state);
      }

      function isAllDone() {
        return state.currentTaskIndex >= state.tasks.length;
      }

      function getCurrentTask() {
        if (state.currentTaskIndex >= state.tasks.length) return null;
        return state.tasks[state.currentTaskIndex];
      }

      function drugById(id) {
        var t = getCurrentTask();
        if (!t || !t.candidates) return null;
        for (var i = 0; i < t.candidates.length; i++) {
          if (t.candidates[i].id === id) return t.candidates[i];
        }
        return null;

        state.visibleDrugIds.push(id);

          state.visibleDrugIds = cand.length ? [cand[0]] : [];
        } else {
          state.visibleDrugIds = [];
        }
        persist();
        renderAll();
      }

      function onMatchSuccess() {
        if (isAllDone()) return;
        if (!state.selectedDrugId) {
          showToast('请先勾选一个 DrugID 商品作为匹配结果');
          return;
        }
        var d = drugById(state.selectedDrugId);
        if (!d) return;
        advanceAfterResolve(function (task) {
          task.status = 'matched';
          task.matchedDrugId = d.drugId;
          task.matchedDrugName = d.name;
          task.resolvedAt = new Date().toISOString();
        });
      }

      function onNewDrug() {
        if (isAllDone()) return;
        advanceAfterResolve(function (task) {
          task.status = 'new_drug';
          task.matchedDrugId = null;
          task.matchedDrugName = null;
          task.resolvedAt = new Date().toISOString();
        });
      }

      function updateActionButtons() {
        var btnOk = document.getElementById('btnMatchOk');
        var btnNew = document.getElementById('btnNewDrug');
        var done = isAllDone();
        if (btnOk) btnOk.disabled = done || !state.selectedDrugId;
        if (btnNew) btnNew.disabled = done;
      }

      function renderProgress() {
        var total = state.tasks.length;
        var idx = Math.min(state.currentTaskIndex, total);
        var remaining = Math.max(0, total - idx);
        var done = total - remaining;
        var pct = total === 0 ? 100 : Math.round((done / total) * 100);
        var fill = document.getElementById('progressFill');
        var tx = document.getElementById('progressText');
        var fr = document.getElementById('progressFraction');
        var wrap = document.getElementById('progressWrap');
        if (isAllDone()) {
          if (fill) fill.style.width = '100%';
          if (tx) tx.textContent = '已全部完成';
          if (fr) fr.textContent = total + ' / ' + total;
          if (wrap) wrap.style.opacity = '0.85';
        } else {
          if (fill) fill.style.width = pct + '%';
          if (tx) tx.textContent = '还剩 ' + remaining + ' 条待匹配';
          if (fr) fr.textContent = '已完成 ' + done + ' / 共 ' + total;
          if (wrap) wrap.style.opacity = '1';
        }
      }

      function renderMeituan() {
        var el = document.getElementById('meituanCol');
        if (isAllDone()) {
          el.innerHTML = '';
          return;
        }
        var m = getCurrentTask().meituan;
        var imgs = (m.images || []).slice(0, 6);
        el.innerHTML =
          '<div class="col-head">' +
          '<span class="pill-meituan">美团商品</span>' +
          '</div>' +
          '<div class="col-body">' +
          '<h2 class="product-title">' + escapeHtml(m.name) + '</h2>' +
          '<div class="meta-grid">' +
          metaCard('规格', m.spec, false) +
          metaCard('条形码 / UPC', m.barcode, false) +
          metaCard('批准文号', m.approvalNo, true) +
          metaCard('生产厂家', m.manufacturer, false) +
          metaCard('处方分类', m.rxCategory, false) +
          '</div>' +
          '<div class="meta-label" style="margin-bottom:6px">商品图片（最多 6 张）</div>' +
          '<div class="gallery">' +
          imgs.map(function (src) {
            return '<img src="' + escapeAttr(src) + '" alt="" loading="lazy" />';
          }).join('') +
          '</div></div>';
      }

      function metaCard(label, val, full) {
        return (
          '<div class="meta-card' + (full ? ' full' : '') + '">' +
          '<div class="meta-label">' + escapeHtml(label) + '</div>' +
          '<div class="meta-value">' + escapeHtml(val) + '</div></div>'
        );
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, '&#39;');
      }

      function confidenceLevel(item) {
        if (item && item.confidence) return item.confidence;
        var raw = String((item && (item.id || item.drugId)) || '0').replace(/\D/g, '');
        var last = Number(raw.charAt(raw.length - 1) || 0);
        if (last === 1 || last === 4 || last === 8) return 'high';
        if (last === 2 || last === 5 || last === 9) return 'medium';
        return 'low';
      }

      function confidenceText(level) {
        if (level === 'high') return '高置信度';
        if (level === 'medium') return '中置信度';
        return '低置信度';
      }

      function confidenceRank(item) {
        var level = confidenceLevel(item);
        if (level === 'high') return 0;
        if (level === 'medium') return 1;
        return 2;
      }

      function confidenceTag(item) {
        var level = confidenceLevel(item);
        return (
          '<span class="confidence-tag confidence-' +
          escapeAttr(level) +
          '">' +
          escapeHtml(confidenceText(level)) +
          '</span>'
        );
      }

      function displayDrugCode(drugId) {
        return String(drugId || '').replace(/^DRUG-/i, '');
      }

      function drugIdentity(item, mode) {
        var cls = mode === 'bookmark' ? 'bm-title' : 'drug-name-inline';
        return (
          '<div class="' +
          cls +
          '"><span class="drug-code">【' +
          escapeHtml(displayDrugCode(item.drugId)) +
          '】</span>' +
          escapeHtml(item.name) +
          '</div>'
        );
      }

      function renderDrugGrid() {
        var grid = document.getElementById('drugGrid');
        if (isAllDone()) {
          grid.innerHTML = '';
          return;
        }
        var n = state.visibleDrugIds.length;
        var slots = Math.min(MAX_SLOTS, Math.max(1, n));
        grid.setAttribute('data-slots', String(slots));
        var html = '';
        for (var i = 0; i < n; i++) {
          var d = drugById(state.visibleDrugIds[i]);
          if (d) html += renderDrugSlot(d);
        }
        grid.innerHTML = html;
      }

      function renderDrugSlot(d) {
        var checked = state.selectedDrugId === d.id;
        var imgs = (d.images || []).slice(0, 6);
        var pick =
          '<label class="pick-row">' +
          '<input type="checkbox" id="pick-' +
          escapeAttr(d.id) +
          '" data-cid="' +
          escapeAttr(d.id) +
          '" ' +
          (checked ? 'checked' : '') +
          ' onchange="window.__app.pick(\'' +
          escapeAttr(d.id) +
          '\')" />' +
          '<span>选中为匹配商品</span>' +
          '</label>';
        var meta =
          '<div class="meta-grid-drug">' +
          tiny('规格', d.spec) +
          tiny('条形码', d.barcode) +
          tiny('批准文号', d.approvalNo || '—') +
          tiny('生产厂家', d.manufacturer) +
          tiny('处方分类', d.rxCategory || '其他') +
          '</div>';
        var gal =
          '<div class="gallery-drug">' +
          imgs
            .map(function (src) {
              return '<img src="' + escapeAttr(src) + '" alt="" loading="lazy" />';
            })
            .join('') +
          '</div>';
        return (
          '<div class="drug-slot' +
          (checked ? ' is-picked' : '') +
          '" data-cid="' +
          escapeAttr(d.id) +
          '">' +
          '<div class="drug-slot-inner">' +
          pick +
          '<div class="drug-identity">' +
          drugIdentity(d, 'slot') +
          confidenceTag(d) +
          '</div>' +
          meta +
          gal +
          '</div></div>'
        );
      }

      function tiny(label, val) {
        return (
          '<div class="meta-tiny"><div class="l">' +
          escapeHtml(label) +
          '</div><div style="font-weight:600;word-break:break-all">' +
          escapeHtml(val) +
          '</div></div>'
        );
      }

      function renderBookmarks() {
        var list = document.getElementById('bookmarkList');
        if (isAllDone()) {
          list.innerHTML = '';
          return;
        }
        var t = getCurrentTask();
        var candidates = (t.candidates || []).slice().sort(function (a, b) {
          var diff = confidenceRank(a) - confidenceRank(b);
          if (diff !== 0) return diff;
          return String(a.drugId || '').localeCompare(String(b.drugId || ''));
        });
        list.innerHTML = candidates.map(function (c) {
          var visible = isVisible(c.id);
          var joinLabel = visible ? '退出展示' : '加入展示';
          var joinClass = visible ? 'btn btn-danger' : 'btn btn-primary';
          var joinHandler = visible
            ? 'onclick="window.__app.remove(\'' + c.id + '\')"'
            : 'onclick="window.__app.add(\'' + c.id + '\')"';
          var disabledAdd =
            !visible && state.visibleDrugIds.length >= MAX_SLOTS ? ' disabled' : '';
          return (
            '<div class="bm-card' + (visible ? ' is-visible' : '') + '" data-id="' +
            escapeAttr(c.id) +
            '">' +
            '<div class="bm-identity">' +
            drugIdentity(c, 'bookmark') +
            confidenceTag(c) +
            '</div>' +
            '<div class="bm-actions">' +
            '<button type="button" class="btn btn-secondary" onclick="window.__app.only(\'' +
            c.id +
            '\')">仅展示</button>' +
            '<button type="button" class="' +
            joinClass +
            '"' +
            joinHandler +
            disabledAdd +
            '>' +
            joinLabel +
            '</button>' +
            '</div></div>'
          );
        }).join('');
      }

      function renderDoneVisibility() {
        var wb = document.getElementById('workbench');
        var ds = document.getElementById('doneScreen');
        if (isAllDone()) {
          if (wb) wb.classList.add('hide');
          if (ds) ds.classList.add('show');
        } else {
          if (wb) wb.classList.remove('hide');
          if (ds) ds.classList.remove('show');
        }
      }

      function renderAll() {
        if (!state.visibleDrugIds || !state.visibleDrugIds.length) {
          var t = getCurrentTask();
          if (t) {
            var c = candidateIdsForTask(t);
            state.visibleDrugIds = c.length ? [c[0]] : [];
          } else state.visibleDrugIds = [];
        }
        renderProgress();
        renderDoneVisibility();
        renderMeituan();
        renderDrugGrid();
        renderBookmarks();
        updateActionButtons();
      }

      var histHref = 'history.html?v=' + encodeURIComponent(VERSION);
      var hl = document.getElementById('historyLink');
      var hl2 = document.getElementById('historyLink2');
      var sideHl = document.getElementById('sideHistoryLink');
      if (hl) hl.setAttribute('href', histHref);
      if (hl2) hl2.setAttribute('href', histHref);
      if (sideHl) sideHl.setAttribute('href', histHref);

      document.getElementById('btnMatchOk').addEventListener('click', onMatchSuccess);
      document.getElementById('btnNewDrug').addEventListener('click', onNewDrug);

      window.__app = {
        only: onlyShow,
        add: addToDisplay,
        remove: removeFromDisplay,
        pick: onPickChange
      };

      renderAll();
    })();
  </script>
</body>
</html>
